version: '3.8'

services:
  # API Gateway (image: при деплое подставляется из tar, иначе собирается из build)
  api:
    image: moskit-api:latest
    build:
      context: .
      dockerfile: moskit-api/Dockerfile
    # 8083 снаружи: 8081 часто занят atra-web-ide-gateway
    ports:
      - "8083:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgres://moskit:password@postgres:5432/moskit
      - POSTGRES_PASSWORD=password
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Frontend (Nuxt)
  # Для VDS: при сборке передать NUXT_PUBLIC_API_URL (публичный URL API для браузера), см. .env.deploy и scripts/deploy_moskit_api_vds.sh
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:8083}
    ports:
      - "3003:3000"
    environment:
      - API_URL=http://api:8080
      - NUXT_PUBLIC_API_URL=http://localhost:8083
    depends_on:
      - api
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: moskit
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moskit
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # Nginx
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/letsencrypt:ro
  #   depends_on:
  #     - web
  #     - api
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
